<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
    margin: 0;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  }
  h2 { margin: 0 0 4px 0; font-size: 26px; font-weight: 700; }
  .subtitle { color: #8e8e93; font-size: 13px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; table-layout: auto; }
  th {
    color: #8e8e93;
    font-size: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #38383a;
    text-align: left;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  th:nth-child(2), td:nth-child(2) { text-align: center; }
  th:nth-child(3), td:nth-child(3) { text-align: center; }
  th:nth-child(4), td:nth-child(4) { text-align: right; }
  td { padding: 12px 0; border-bottom: 1px solid #1c1c1e; vertical-align: middle; }
  .exercise { font-weight: 600; color: #0a84ff; font-size: 14px; line-height: 1.25; padding-right: 6px; }
  .range { display: block; color: #8e8e93; font-weight: 400; font-size: 11px; margin-top: 2px; }
  .stat { font-size: 16px; font-weight: 600; white-space: nowrap; padding: 0 2px; }
  .controls { display: flex; gap: 6px; justify-content: flex-end; }
  button {
    background: #2c2c2e;
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 8px;
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  button:active { background: #48484a; }
  .reset {
    margin-top: 24px;
    width: 100%;
    background: #1c1c1e;
    color: #ff453a;
    height: 44px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    border: none;
  }
  .reset:active { background: #2c2c2e; }
</style>
</head>
<body>
  <h2>Workout</h2>
  <div class="subtitle">Tap + to progress reps. At max reps, + adds weight and resets reps.</div>
  <table>
    <thead>
      <tr>
        <th>Exercise</th>
        <th>Reps</th>
        <th>Lbs</th>
        <th>+/-</th>
      </tr>
    </thead>
    <tbody id="app"></tbody>
  </table>
  <button class="reset" onclick="resetAll()">Reset to Defaults</button>

  <script>
    const defaultData = [
      { exercise: 'Leg Press',        sets: '3×8-12',  reps: 8,  weight: 70, minReps: 8,  maxReps: 12, step: 10 },
      { exercise: 'Vertical Traction',sets: '3×8-12',  reps: 8,  weight: 80, minReps: 8,  maxReps: 12, step: 10 },
      { exercise: 'Chest Press',      sets: '3×8-12',  reps: 9,  weight: 60, minReps: 8,  maxReps: 12, step: 10 },
      { exercise: 'Low Row',          sets: '3×8-12',  reps: 8,  weight: 80, minReps: 8,  maxReps: 12, step: 10 },
      { exercise: 'Leg Curl',         sets: '2×10-12', reps: 11, weight: 60, minReps: 10, maxReps: 12, step: 10 },
      { exercise: 'Lower Back',       sets: '2×12-15', reps: 13, weight: 60, minReps: 12, maxReps: 15, step: 10 },
      { exercise: 'Abdominal',        sets: '2×12-15', reps: 13, weight: 70, minReps: 12, maxReps: 15, step: 10 }
    ];

    const STORAGE_KEY = 'workoutTrackerV1';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(JSON.stringify(defaultData));

    function saveAndRender() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    }

    function increment(i) {
      let item = data[i];
      if (item.reps < item.maxReps) {
        item.reps++;
      } else {
        item.reps = item.minReps;
        item.weight += item.step;
      }
      saveAndRender();
    }

    function decrement(i) {
      let item = data[i];
      if (item.reps > item.minReps) {
        item.reps--;
      } else {
        item.reps = item.maxReps;
        item.weight = Math.max(0, item.weight - item.step);
      }
      saveAndRender();
    }

    function resetAll() {
      if (confirm('Reset all exercises to their starting reps and weights?')) {
        data = JSON.parse(JSON.stringify(defaultData));
        saveAndRender();
      }
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = data.map((item, i) => `
        <tr>
          <td class="exercise">${item.exercise}<span class="range">${item.sets}</span></td>
          <td class="stat">${item.reps}</td>
          <td class="stat">${item.weight}</td>
          <td>
            <div class="controls">
              <button onclick="decrement(${i})">-</button>
              <button onclick="increment(${i})">+</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    render();
  </script>
</body>
</html>
